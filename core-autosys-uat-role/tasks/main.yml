- name: Autosys Control Playbook
  hosts: autosys_hosts
  become: yes
  serial: 1   # sequential execution across hosts
  tasks:
    - name: Include stop tasks
      import_tasks: stop.yml
      tags: stop

    - name: Include start tasks
      import_tasks: start.yml
      tags: start

    - name: Include status tasks
      import_tasks: status.yml
      tags: status

    - name: Restart sequence (stop → start → status)
      block:
        - import_tasks: stop.yml
        - import_tasks: start.yml
        - import_tasks: status.yml
      tags: restart